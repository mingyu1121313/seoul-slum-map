<!-- ── 본체 ──────────────────────────────────── -->

  <div id="map-wrapper">

    <div id="map-type-ctrl">
      <button class="mtype-btn active" onclick="setMapType('normal', this)">지형지도</button>

    <label id="info-toggle">

    </div>

    <div id="map"></div>
  </div>
</div>

<div id="bottom-bar"></div>

<!-- ── 오른쪽 패널 ───────────────────────────── -->

  <button id="btn-close" onclick="closePanel()">×</button>

  <div class="p-header">
    <h2 id="p-name"></h2>
    <p  id="p-location"></p>
    <span id="p-badge" class="badge"></span>

      <tr><td>규모</td>    <td id="p-households"></td></tr>
    </table>
  </div>
</div>

  {

  {

/* ━━━━━━━━━━━━━━━━ 지도 초기화 ━━━━━━━━━━━━━━━━ */
var map = new naver.maps.Map('map', {
  center: new naver.maps.LatLng(37.555, 127.000),
  zoom: 12,
  mapTypeId: naver.maps.MapTypeId.NORMAL,
  zoomControl: true,
  zoomControlOptions: {
    style: naver.maps.ZoomControlStyle.SMALL,
    position: naver.maps.Position.RIGHT_CENTER
  },
  logoControlOptions: { position: naver.maps.Position.BOTTOM_RIGHT },
  scaleControlOptions: { position: naver.maps.Position.BOTTOM_LEFT }
});

/* ━━━━━━━━━━━━━━━━ 상태 ━━━━━━━━━━━━━━━━ */
var activeVillage  = null;
var tooltipWindow  = new naver.maps.InfoWindow({
  borderWidth: 0,
  disableAnchor: true,
  backgroundColor: 'transparent',
  pixelOffset: new naver.maps.Point(0, -6)
});

/* ━━━━━━━━━━━━━━━━ 마커 아이콘 생성 ━━━━━━━━━━━━━━━━ */
function makeIcon(color, active) {
  var s = active ? 20 : 14;
  var a = active ? 10 : 7;
  return {
    content: '<div style="'
      + 'width:'  + s + 'px;'
      + 'height:' + s + 'px;'
      + 'border-radius:50%;'
      + 'background:' + color + ';'
      + 'border:2.5px solid #fff;'
      + 'box-shadow:0 2px 6px rgba(0,0,0,0.35);'
      + 'cursor:pointer;'
      + '"></div>',
    anchor: new naver.maps.Point(a, a)
  };
}

/* ━━━━━━━━━━━━━━━━ 마커 + 사이드바 아이템 생성 ━━━━━━━━━━━━━━━━ */
var listEl = document.getElementById('village-list');

DATA.forEach(function(v) {
  var color = v.type === '불법건축물' ? '#E53935' : '#43A047';

  /* 마커 */
  var marker = new naver.maps.Marker({
    map: map,
    position: new naver.maps.LatLng(v.lat, v.lng),
    icon: makeIcon(color, false),
    zIndex: 100
  });
  v._marker = marker;
  v._color  = color;

  /* 마커 이벤트 */
  naver.maps.Event.addListener(marker, 'mouseover', function() {
    if (activeVillage !== v) marker.setIcon(makeIcon(color, true));
    tooltipWindow.setContent(
      '<div style="'
      + 'background:#1a1a2e;color:#fff;'
      + 'padding:5px 10px;border-radius:6px;'
      + 'font-size:12px;font-weight:600;white-space:nowrap;'
      + 'font-family:-apple-system,BlinkMacSystemFont,sans-serif;'
      + '">' + v.name + '</div>'
    );
    tooltipWindow.open(map, marker);
  });

  naver.maps.Event.addListener(marker, 'mouseout', function() {
    if (activeVillage !== v) marker.setIcon(makeIcon(color, false));
    tooltipWindow.close();
  });

  naver.maps.Event.addListener(marker, 'click', function() {
    tooltipWindow.close();
    selectVillage(v);
  });

  /* 사이드바 아이템 */
  var item = document.createElement('div');
  item.className = 'v-item';
  item.innerHTML =
    '<span class="v-dot" style="background:' + color + ';"></span>'
    + '<div class="v-info">'
    +   '<div class="v-name">' + v.name + '</div>'
    +   '<div class="v-gu">'  + v.gu   + '</div>'
    + '</div>';

  item.addEventListener('click', function() {
    map.panTo(new naver.maps.LatLng(v.lat, v.lng));
    if (map.getZoom() < 14) map.setZoom(15);
    selectVillage(v);
  });

  v._listItem = item;
  listEl.appendChild(item);
});

/* ━━━━━━━━━━━━━━━━ 마을 선택 ━━━━━━━━━━━━━━━━ */
function selectVillage(v) {
  /* 이전 선택 해제 */
  if (activeVillage) {
    activeVillage._marker.setIcon(makeIcon(activeVillage._color, false));
    activeVillage._listItem.classList.remove('active');
  }

  activeVillage = v;
  v._marker.setIcon(makeIcon(v._color, true));
  v._listItem.classList.add('active');

  /* 사이드바 스크롤 */
  v._listItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  openPanel(v);
}

/* ━━━━━━━━━━━━━━━━ 패널 열기 ━━━━━━━━━━━━━━━━ */
function openPanel(v) {
  document.getElementById('p-name').textContent       = v.name;
  document.getElementById('p-location').textContent   = v.gu + ' · ' + v.dong;
  document.getElementById('p-desc').textContent       = v.desc;
  document.getElementById('p-address').textContent    = v.address;
  document.getElementById('p-formed').textContent     = v.formed;
  document.getElementById('p-households').textContent = v.households;

  var badge = document.getElementById('p-badge');
  badge.textContent = v.type;
  badge.className   = 'badge ' + (v.type === '불법건축물' ? 'badge-illegal' : 'badge-legal');

  loadPhoto(v);

  document.getElementById('panel').classList.add('open');
}

/* ━━━━━━━━━━━━━━━━ 사진 로드 ━━━━━━━━━━━━━━━━ */
function loadPhoto(v) {
  var div  = document.getElementById('p-photo');
  var exts = ['jpg', 'jpeg', 'png', 'webp'];
  var idx  = 0;

  div.innerHTML = '';   /* 초기화 */

  (function tryNext() {
    if (idx >= exts.length) {
      div.innerHTML =
        '<div class="photo-placeholder">'
        + '<span class="ph-icon">📷</span>'
        + '<span>사진 준비 중</span>'
        + '</div>';
      return;
    }
    var img = new Image();
    var src = 'images/' + encodeURIComponent(v.name) + '.' + exts[idx];
    img.onload  = function() {
      div.innerHTML = '<img src="' + src + '" alt="' + v.name + '" />';
    };
    img.onerror = function() { idx++; tryNext(); };
    img.src = src;
  })();
}

/* ━━━━━━━━━━━━━━━━ 패널 닫기 ━━━━━━━━━━━━━━━━ */
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (activeVillage) {
    activeVillage._marker.setIcon(makeIcon(activeVillage._color, false));
    activeVillage._listItem.classList.remove('active');
    activeVillage = null;
  }
}

/* ━━━━━━━━━━━━━━━━ 지도 타입 전환 ━━━━━━━━━━━━━━━━ */
function setMapType(type, btn) {
  var isSat = type === 'satellite';
  var infoToggle = document.getElementById('info-toggle');
  var infoCheck  = document.getElementById('info-check');
  if (isSat) {
    infoToggle.style.display = 'flex';
    map.setMapTypeId(infoCheck.checked ? naver.maps.MapTypeId.HYBRID : naver.maps.MapTypeId.SATELLITE);
  } else {
    infoToggle.style.display = 'none';
    map.setMapTypeId(naver.maps.MapTypeId.NORMAL);
  }
  document.querySelectorAll('.mtype-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

function toggleInfoLayer(checked) {
  map.setMapTypeId(checked ? naver.maps.MapTypeId.HYBRID : naver.maps.MapTypeId.SATELLITE);
}

/* ━━━━━━━━━━━━━━━━ 서울 구 경계선 ━━━━━━━━━━━━━━━━ */
fetch('https://raw.githubusercontent.com/southkorea/seoul-maps/master/kostat/2013/json/seoul_municipalities_geo_simple.json')
  .then(function(r) { return r.json(); })
  .then(function(geojson) {
    geojson.features.forEach(function(feature) {
      var geom = feature.geometry;
      var polys = geom.type === 'MultiPolygon' ? geom.coordinates : [geom.coordinates];
      polys.forEach(function(poly) {
        poly.forEach(function(ring) {
          new naver.maps.Polyline({
            map: map,
            path: ring.map(function(c) { return new naver.maps.LatLng(c[1], c[0]); }),
            strokeColor: '#ffffff',
            strokeOpacity: 0.85,
            strokeWeight: 1.5,
            strokeStyle: 'solid',
            clickable: false
          });
        });
      });
    });
  });

/* 지도 빈 곳 클릭 → 패널 닫기 */
naver.maps.Event.addListener(map, 'click', function() {
  closePanel();
});

</script>
