const results = [];
let idx = 0;

function log(msg, cls='') {
  const d = document.getElementById('log');
  d.innerHTML += '<div class="' + cls + '">' + msg + '</div>';
  d.scrollTop = d.scrollHeight;
}

function updateProgress() {
  document.getElementById('progress').textContent =
    `진행: ${idx} / ${MOATOWN_RAW.length} (${Math.round(idx/MOATOWN_RAW.length*100)}%)`;
}

function geocodeNext() {
  if (idx >= MOATOWN_RAW.length) {
    log('✅ 완료! JSON을 복사하세요.', 'info');
    document.getElementById('output').value = JSON.stringify(results, null, 2);
    updateProgress();
    return;
  }
  const item = MOATOWN_RAW[idx];
  naver.maps.Service.geocode({ query: item.query }, function(status, response) {
    if (status === naver.maps.Service.Status.OK && response.v2.addresses.length > 0) {
      const loc = response.v2.addresses[0];
      results.push({
        id: item.id,
        gu: item.gu,
        addr: item.addr,
        area: item.area,
        date: item.date,
        section: item.section,
        lat: parseFloat(loc.y),
        lng: parseFloat(loc.x)
      });
      log(`✓ [${idx+1}] ${item.query} → ${loc.y}, ${loc.x}`, 'ok');
    } else {
      results.push({
        id: item.id,
        gu: item.gu,
        addr: item.addr,
        area: item.area,
        date: item.date,
        section: item.section,
        lat: null,
        lng: null
      });
      log(`✗ [${idx+1}] 실패: ${item.query} (status: ${status})`, 'err');
    }
    idx++;
    updateProgress();
    setTimeout(geocodeNext, 150);
  });
}

function startGeocoding() {
  idx = 0;
  results.length = 0;
  document.getElementById('log').innerHTML = '';
  document.getElementById('output').value = '';
  log('지오코딩 시작...', 'info');
  geocodeNext();
}

function copyOutput() {
  const el = document.getElementById('output');
  el.select();
  document.execCommand('copy');
  alert('JSON 복사됨!');
}
